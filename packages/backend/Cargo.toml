[package]
name = "backend"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.8.3", default-features = false, features = ["napi4", "async", "tokio_rt"] }
napi-derive = "3.5.2"
sea-orm = { version = "1.1.0", features = ["sqlx-mysql", "runtime-tokio-rustls", "macros"] }
tokio = { version = "1.40.0", features = ["full"] }
dotenvy = "0.15.0"
once_cell = "1.21.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0"

[build-dependencies]
napi-build = "2.3.1"
